<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Buzzive — モックプレビュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-router-dom@6.26.2/dist/umd/react-router-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      ink:'#161320', coal:'#211c30',
      buzz:{DEFAULT:'#FF3D7F',400:'#ff5c93',500:'#FF3D7F',600:'#e91e63'},
      volt:{DEFAULT:'#C6FF3D',400:'#d4ff66',500:'#C6FF3D'},
      sky2:{DEFAULT:'#3DD6FF',500:'#3DD6FF'},
      cream:'#F5F0E8',
    },
    fontFamily:{ display:['"Clash Display"','sans-serif'], sans:['"Plus Jakarta Sans"','sans-serif'], mono:['"Space Mono"','monospace'] },
    boxShadow:{ pop:'4px 4px 0 0 rgba(0,0,0,0.9)','pop-sm':'2px 2px 0 0 rgba(0,0,0,0.9)' },
    keyframes:{
      buzzin:{'0%':{transform:'scale(0.9)',opacity:'0'},'100%':{transform:'scale(1)',opacity:'1'}},
      pulseRing:{'0%':{transform:'scale(0.95)',boxShadow:'0 0 0 0 rgba(255,61,127,0.5)'},'70%':{transform:'scale(1)',boxShadow:'0 0 0 22px rgba(255,61,127,0)'},'100%':{transform:'scale(0.95)',boxShadow:'0 0 0 0 rgba(255,61,127,0)'}},
      slideUp:{'0%':{transform:'translateY(12px)',opacity:'0'},'100%':{transform:'translateY(0)',opacity:'1'}},
      wiggle:{'0%,100%':{transform:'rotate(-2deg)'},'50%':{transform:'rotate(2deg)'}},
    },
    animation:{ buzzin:'buzzin 0.3s ease-out', pulseRing:'pulseRing 1.4s infinite', slideUp:'slideUp 0.35s ease-out both', wiggle:'wiggle 0.4s ease-in-out' },
  }}
}
</script>
<style>
  html,body,#root{height:100%}
  body{margin:0;background:#0e0b16;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased}
  #root{display:flex;justify-content:center}
  .font-display{font-family:'Clash Display',sans-serif}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
  .grain{background-image:radial-gradient(rgba(255,255,255,0.025) 1px,transparent 1px);background-size:4px 4px}
  .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react,typescript">
const { useState, createContext, useContext } = React;
const { HashRouter, Routes, Route, useNavigate, useLocation, useParams } = ReactRouterDOM;

// ============ MOCK DATA ============
const CATEGORIES = ['雑学','アニメ','ポーカー','身内ネタ','旅行','学園祭','映画','スポーツ'];
const mockPacks = [
  {id:'pack-1',title:'雑学パック',description:'日常で使えるちょっとした雑学クイズ集',category:'雑学',questionCount:12},
  {id:'pack-2',title:'アニメ名作パック',description:'90年代〜最新まで、アニメ好きが集まる夜に',category:'アニメ',questionCount:20},
  {id:'pack-3',title:'身内ネタ大会',description:'サークルメンバーしか分からない問題たち',category:'身内ネタ',questionCount:8},
  {id:'pack-4',title:'ポーカー初級',description:'役の強さからハンドの確率まで',category:'ポーカー',questionCount:15},
];
const mockQuestions = {'pack-1':[
  {id:'q-1',packId:'pack-1',questionText:'世界で一番高い山はエベレストですが、では海底からの高さで一番高い山は？',answerText:'マウナ・ケア',explanation:'ハワイ島にあり、海底からの高さは約10,000m。',difficulty:'normal',order:0},
  {id:'q-2',packId:'pack-1',questionText:'1分間は60秒。では1日は何秒でしょう？',answerText:'86,400秒',explanation:'60 × 60 × 24 = 86,400。',difficulty:'easy',order:1},
  {id:'q-3',packId:'pack-1',questionText:'バナナは植物学上、果物ではなく何に分類される？',answerText:'ベリー（液果）',explanation:'バナナは植物学的にはベリーの一種。',difficulty:'hard',order:2},
]};
const defaultSettings = {totalQuestions:10,correctPoint:10,wrongPoint:0,questionerMode:'rotation'};
const mockMembers = [
  {id:'m-1',name:'あなた',isGuest:false,isOnline:true,joinOrder:0,avatarColor:'#FF3D7F'},
  {id:'m-2',name:'ゆうた',isGuest:true,isOnline:true,joinOrder:1,avatarColor:'#C6FF3D'},
  {id:'m-3',name:'みき',isGuest:true,isOnline:true,joinOrder:2,avatarColor:'#3DD6FF'},
  {id:'m-4',name:'けんと',isGuest:true,isOnline:false,joinOrder:3,avatarColor:'#FFB23D'},
];
const mockResults = [
  {...mockMembers[1],score:70,correctCount:7,wrongCount:1,buzzCount:9,questionerCount:3},
  {...mockMembers[0],score:50,correctCount:5,wrongCount:2,buzzCount:8,questionerCount:2},
  {...mockMembers[2],score:40,correctCount:4,wrongCount:0,buzzCount:5,questionerCount:3},
  {...mockMembers[3],score:20,correctCount:2,wrongCount:3,buzzCount:4,questionerCount:2},
];

// ============ CONTEXT ============
const Ctx = createContext(null);
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('')}
function AppProvider({children}){
  const [isGoogleUser,setG]=useState(false);
  const [displayName,setName]=useState('');
  const [selectedPackIds,setSel]=useState(['pack-1']);
  const [settings,setSettings]=useState(defaultSettings);
  const [roomCode]=useState(genCode());
  const value={
    isGoogleUser,displayName,
    signInWithGoogle:()=>{setG(true);setName('あなた')},
    setGuestName:(n)=>setName(n),
    packs:mockPacks,selectedPackIds,
    togglePack:(id)=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]),
    settings,setSettings,roomCode,
  };
  return <Ctx.Provider value={value}>{children}</Ctx.Provider>;
}
const useApp=()=>useContext(Ctx);

// ============ UI ============
function PhoneShell({children}){return <div className="grain min-h-screen w-full max-w-[440px] bg-ink text-cream flex flex-col relative overflow-hidden">{children}</div>}
function TopBar({title,onBack,right}){return(
  <header className="flex items-center gap-3 px-5 pt-6 pb-4 shrink-0">
    {onBack&&<button onClick={onBack} aria-label="戻る" className="w-9 h-9 grid place-items-center rounded-full bg-coal border border-white/10 active:scale-95 transition"><span className="text-lg leading-none">‹</span></button>}
    {title&&<h1 className="font-display text-2xl tracking-tight">{title}</h1>}
    <div className="ml-auto">{right}</div>
  </header>
)}
function Button({variant='primary',full,className='',children,...rest}){
  const base='inline-flex items-center justify-center gap-2 font-bold rounded-2xl px-5 py-3.5 transition active:translate-x-[2px] active:translate-y-[2px] active:shadow-none disabled:opacity-40 disabled:pointer-events-none';
  const v={primary:'bg-buzz text-white shadow-pop',volt:'bg-volt text-ink shadow-pop',dark:'bg-coal text-cream border border-white/10',ghost:'bg-transparent text-cream/70 hover:text-cream'};
  return <button className={`${base} ${v[variant]} ${full?'w-full':''} ${className}`} {...rest}>{children}</button>;
}
function Card({children,className='',onClick}){return <div onClick={onClick} className={`rounded-2xl bg-coal border border-white/10 ${onClick?'cursor-pointer active:scale-[0.99] transition':''} ${className}`}>{children}</div>}
function DiffBadge({difficulty}){const m={easy:{label:'やさしい',cls:'bg-sky2/20 text-sky2'},normal:{label:'ふつう',cls:'bg-volt/20 text-volt'},hard:{label:'むずかしい',cls:'bg-buzz/20 text-buzz-400'}};const d=m[difficulty];return <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full ${d.cls}`}>{d.label}</span>}
function Avatar({name,color,size=40}){return <div className="rounded-xl grid place-items-center font-display text-ink shrink-0" style={{width:size,height:size,background:color,fontSize:size*0.42}}>{name.slice(0,1)}</div>}
function Chip({active,children,onClick}){return <button onClick={onClick} className={`text-sm font-semibold px-3.5 py-2 rounded-full border transition active:scale-95 ${active?'bg-volt text-ink border-volt':'bg-coal text-cream/70 border-white/10 hover:border-white/30'}`}>{children}</button>}

// ============ TOP ============
function TopPage(){
  const nav=useNavigate();const {isGoogleUser,displayName,signInWithGoogle,setGuestName}=useApp();
  const [mode,setMode]=useState('home');const [name,setName]=useState('');
  const signedIn=isGoogleUser||displayName!=='';
  const GoogleMark=()=> <span className="w-5 h-5 grid place-items-center bg-white rounded-full text-[13px] font-black text-buzz">G</span>;
  return(
    <PhoneShell>
      <div className="absolute -top-10 -right-10 w-52 h-52 rounded-full bg-buzz/20 blur-2xl"/>
      <div className="absolute top-44 -left-16 w-44 h-44 rounded-full bg-volt/10 blur-2xl"/>
      <div className="flex-1 flex flex-col px-6 pt-16 pb-8 relative z-10">
        <div className="animate-slideUp">
          <div className="inline-flex items-center gap-2 mb-6"><span className="w-3 h-3 rounded-full bg-buzz animate-pulse"/><span className="font-mono text-xs tracking-[0.2em] text-volt uppercase">live quiz</span></div>
          <h1 className="font-display text-7xl leading-[0.92] tracking-tighter">Buzz<span className="text-buzz">ive</span></h1>
          <p className="mt-5 text-2xl font-bold leading-snug text-cream/95">集まれば、<br/>エンタメになる。</p>
          <p className="mt-3 text-sm text-cream/55 leading-relaxed">友達同士でリアルタイムに早押しクイズ大会。<br/>URLを共有して、数分後には大会がはじまる。</p>
        </div>
        <div className="my-10 grid place-items-center"><div className="w-40 h-40 rounded-full bg-buzz grid place-items-center shadow-pop animate-pulseRing"><span className="font-display text-3xl text-white">BUZZ</span></div></div>
        <div className="mt-auto space-y-3 animate-slideUp">
          {signedIn?(<>
            <div className="text-center text-sm text-cream/60 mb-1">{displayName} さんとして参加中{isGoogleUser&&<span className="ml-1 text-volt">· Google</span>}</div>
            <Button variant="volt" full onClick={()=>nav('/rooms/new')}>ルームを作る</Button>
            <Button variant="dark" full onClick={()=>nav('/rooms/MOCK/lobby')}>ルームに参加する</Button>
            {isGoogleUser&&<Button variant="ghost" full onClick={()=>nav('/packs')}>クイズパックを管理 →</Button>}
          </>):mode==='home'?(<>
            <Button variant="primary" full onClick={signInWithGoogle}><GoogleMark/> Googleではじめる</Button>
            <Button variant="dark" full onClick={()=>setMode('guest')}>ゲストとして参加</Button>
            <p className="text-center text-xs text-cream/40 pt-1">パック作成にはGoogleログインが必要です</p>
          </>):(
            <div className="space-y-3">
              <label className="block text-sm font-semibold text-cream/70">表示名を入力</label>
              <input autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="例：ゆうた" maxLength={12} className="w-full rounded-2xl bg-coal border border-white/10 px-4 py-3.5 text-lg outline-none focus:border-buzz transition"/>
              <Button variant="volt" full disabled={!name.trim()} onClick={()=>setGuestName(name.trim())}>この名前ではじめる</Button>
              <Button variant="ghost" full onClick={()=>setMode('home')}>‹ 戻る</Button>
            </div>
          )}
        </div>
      </div>
    </PhoneShell>
  );
}

// ============ PACK LIST ============
function PackListPage(){
  const nav=useNavigate();const {packs}=useApp();
  return(<PhoneShell>
    <TopBar title="クイズパック" onBack={()=>nav('/')}/>
    <div className="flex-1 overflow-y-auto no-scrollbar px-5 pb-28">
      <p className="text-sm text-cream/55 mb-5">自分で作った問題パック。複数を組み合わせて大会を作れます。</p>
      <div className="space-y-3">{packs.map(p=>(
        <Card key={p.id} onClick={()=>nav(`/packs/${p.id}/questions`)} className="p-4">
          <div className="flex items-center gap-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 mb-1"><span className="text-[11px] font-bold px-2 py-0.5 rounded-full bg-volt/20 text-volt">{p.category}</span></div>
              <h3 className="font-display text-xl leading-tight truncate">{p.title}</h3>
              <p className="text-xs text-cream/50 mt-0.5 truncate">{p.description}</p>
            </div>
            <div className="text-right shrink-0"><div className="font-display text-2xl text-buzz">{p.questionCount}</div><div className="text-[10px] text-cream/40 -mt-1">問題</div></div>
          </div>
        </Card>
      ))}</div>
      <button onClick={()=>nav('/packs/new')} className="mt-3 w-full rounded-2xl border-2 border-dashed border-white/15 py-5 text-cream/50 font-semibold hover:border-volt hover:text-volt transition active:scale-[0.99]">+ 新しいパックを作る</button>
    </div>
    <div className="absolute bottom-0 inset-x-0 p-5 bg-gradient-to-t from-ink via-ink to-transparent"><Button variant="volt" full onClick={()=>nav('/packs/new')}>新しいパックを作る</Button></div>
  </PhoneShell>);
}

// ============ PACK EDIT ============
function PackEditPage(){
  const nav=useNavigate();const {packId}=useParams();const {packs}=useApp();
  const isEdit=Boolean(packId);const existing=packs.find(p=>p.id===packId);
  const [title,setTitle]=useState(existing?.title??'');const [desc,setDesc]=useState(existing?.description??'');const [category,setCategory]=useState(existing?.category??CATEGORIES[0]);
  const Field=({label,children})=> <div><label className="block text-sm font-semibold text-cream/70 mb-2">{label}</label>{children}</div>;
  return(<PhoneShell>
    <TopBar title={isEdit?'パックを編集':'新しいパック'} onBack={()=>nav(-1)}/>
    <div className="flex-1 overflow-y-auto no-scrollbar px-5 pb-28 space-y-6">
      <Field label="パック名"><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="例：身内ネタ大会" className="w-full rounded-2xl bg-coal border border-white/10 px-4 py-3.5 text-lg outline-none focus:border-buzz transition"/></Field>
      <Field label="説明"><textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="どんなパックか一言で" rows={3} className="w-full rounded-2xl bg-coal border border-white/10 px-4 py-3.5 text-base outline-none focus:border-buzz transition resize-none"/></Field>
      <Field label="カテゴリ"><div className="flex flex-wrap gap-2">{CATEGORIES.map(c=><Chip key={c} active={category===c} onClick={()=>setCategory(c)}>{c}</Chip>)}</div></Field>
      {isEdit&&<div className="pt-2"><Button variant="dark" full onClick={()=>nav(`/packs/${packId}/questions`)}>問題を編集する（{existing?.questionCount??0}問）→</Button><button className="w-full mt-3 text-sm text-buzz-400 font-semibold py-2">このパックを削除</button></div>}
    </div>
    <div className="absolute bottom-0 inset-x-0 p-5 bg-gradient-to-t from-ink via-ink to-transparent"><Button variant="volt" full disabled={!title.trim()} onClick={()=>nav(isEdit?`/packs/${packId}/questions`:'/packs')}>{isEdit?'保存する':'パックを作成して問題を追加'}</Button></div>
  </PhoneShell>);
}

// ============ QUESTION LIST ============
function QuestionListPage(){
  const nav=useNavigate();const {packId}=useParams();const {packs}=useApp();
  const pack=packs.find(p=>p.id===packId);
  const [questions,setQuestions]=useState(mockQuestions[packId]??[]);
  const [editing,setEditing]=useState(null);
  return(<PhoneShell>
    <TopBar title={pack?.title??'問題'} onBack={()=>nav('/packs')}/>
    <div className="flex-1 overflow-y-auto no-scrollbar px-5 pb-28">
      <div className="flex items-baseline justify-between mb-4"><p className="text-sm text-cream/55">{questions.length}問の問題</p><span className="text-[11px] font-bold px-2 py-0.5 rounded-full bg-volt/20 text-volt">{pack?.category}</span></div>
      {questions.length===0?(
        <div className="mt-16 text-center"><div className="font-display text-5xl text-cream/15 mb-3">?</div><p className="text-cream/50 font-semibold">まだ問題がありません</p><p className="text-sm text-cream/35 mt-1">最初の問題を追加しましょう</p></div>
      ):(<div className="space-y-3">{questions.map((q,i)=>(
        <Card key={q.id} onClick={()=>setEditing(q)} className="p-4"><div className="flex items-start gap-3">
          <span className="font-mono text-sm text-cream/30 mt-0.5">{String(i+1).padStart(2,'0')}</span>
          <div className="flex-1 min-w-0"><p className="text-sm leading-snug line-clamp-2">{q.questionText}</p>
          <div className="flex items-center gap-2 mt-2"><DiffBadge difficulty={q.difficulty}/><span className="text-xs text-cream/40">答: {q.answerText}</span></div></div>
        </div></Card>
      ))}</div>)}
      <button onClick={()=>setEditing({id:`q-new-${Date.now()}`,packId,questionText:'',answerText:'',explanation:'',difficulty:'normal',order:questions.length})} className="mt-3 w-full rounded-2xl border-2 border-dashed border-white/15 py-5 text-cream/50 font-semibold hover:border-volt hover:text-volt transition active:scale-[0.99]">+ 問題を追加</button>
    </div>
    <div className="absolute bottom-0 inset-x-0 p-5 bg-gradient-to-t from-ink via-ink to-transparent"><Button variant="dark" full onClick={()=>nav('/packs')}>完了</Button></div>
    {editing&&<QuestionSheet question={editing} onClose={()=>setEditing(null)} onSave={q=>{setQuestions(prev=>{const ex=prev.some(x=>x.id===q.id);return ex?prev.map(x=>x.id===q.id?q:x):[...prev,q]});setEditing(null)}}/>}
  </PhoneShell>);
}
function QuestionSheet({question,onClose,onSave}){
  const [q,setQ]=useState(question);const diffs=['easy','normal','hard'];
  return(<div className="absolute inset-0 z-30 flex flex-col justify-end">
    <div className="absolute inset-0 bg-black/60" onClick={onClose}/>
    <div className="relative bg-coal rounded-t-3xl border-t border-white/10 p-5 pb-7 max-h-[88%] overflow-y-auto no-scrollbar animate-slideUp">
      <div className="w-10 h-1 rounded-full bg-white/20 mx-auto mb-4"/>
      <h2 className="font-display text-2xl mb-5">問題を編集</h2>
      <label className="block text-sm font-semibold text-cream/70 mb-2">問題文</label>
      <textarea value={q.questionText} onChange={e=>setQ({...q,questionText:e.target.value})} rows={3} placeholder="問題を入力" className="w-full rounded-2xl bg-ink border border-white/10 px-4 py-3 outline-none focus:border-buzz transition resize-none mb-4"/>
      <label className="block text-sm font-semibold text-cream/70 mb-2">答え</label>
      <input value={q.answerText} onChange={e=>setQ({...q,answerText:e.target.value})} placeholder="正解" className="w-full rounded-2xl bg-ink border border-white/10 px-4 py-3 outline-none focus:border-buzz transition mb-4"/>
      <label className="block text-sm font-semibold text-cream/70 mb-2">解説（任意）</label>
      <input value={q.explanation} onChange={e=>setQ({...q,explanation:e.target.value})} placeholder="補足や豆知識" className="w-full rounded-2xl bg-ink border border-white/10 px-4 py-3 outline-none focus:border-buzz transition mb-4"/>
      <label className="block text-sm font-semibold text-cream/70 mb-2">難易度</label>
      <div className="flex gap-2 mb-6">{diffs.map(d=><button key={d} onClick={()=>setQ({...q,difficulty:d})} className={`flex-1 py-2.5 rounded-xl font-semibold text-sm transition ${q.difficulty===d?'bg-volt text-ink':'bg-ink text-cream/60 border border-white/10'}`}>{d==='easy'?'やさしい':d==='normal'?'ふつう':'むずかしい'}</button>)}</div>
      <Button variant="volt" full disabled={!q.questionText.trim()||!q.answerText.trim()} onClick={()=>onSave(q)}>保存</Button>
    </div>
  </div>);
}

// ============ ROOM CREATE ============
function RoomCreatePage(){
  const nav=useNavigate();const {packs,selectedPackIds,togglePack,settings,setSettings}=useApp();
  const totalAvailable=packs.filter(p=>selectedPackIds.includes(p.id)).reduce((s,p)=>s+p.questionCount,0);
  const SectionLabel=({n,title,hint})=><div className="flex items-baseline gap-2.5"><span className="font-mono text-sm text-buzz">{n}</span><h2 className="font-display text-xl">{title}</h2>{hint&&<span className="text-xs text-cream/40 ml-auto">{hint}</span>}</div>;
  const StepBtn=({children,onClick,disabled})=><button onClick={onClick} disabled={disabled} className="w-9 h-9 rounded-full bg-coal border border-white/10 grid place-items-center text-lg font-bold active:scale-90 transition disabled:opacity-30">{children}</button>;
  const Stepper=({label,value,min,max,step,suffix,onChange})=>(
    <div className="flex items-center justify-between"><span className="text-sm font-semibold text-cream/70">{label}</span>
    <div className="flex items-center gap-3"><StepBtn onClick={()=>onChange(Math.max(min,value-step))} disabled={value<=min}>−</StepBtn>
    <span className="font-display text-xl w-16 text-center tabular-nums">{value}<span className="text-sm text-cream/40 ml-0.5">{suffix}</span></span>
    <StepBtn onClick={()=>onChange(Math.min(max,value+step))} disabled={value>=max}>+</StepBtn></div></div>
  );
  return(<PhoneShell>
    <TopBar title="ルームを作る" onBack={()=>nav('/')}/>
    <div className="flex-1 overflow-y-auto no-scrollbar px-5 pb-28 space-y-7">
      <section><SectionLabel n="01" title="クイズパックを選ぶ" hint="複数選べます"/>
        <div className="space-y-2.5 mt-3">{packs.map(p=>{const on=selectedPackIds.includes(p.id);return(
          <Card key={p.id} onClick={()=>togglePack(p.id)} className={`p-3.5 border-2 ${on?'border-volt':'border-white/10'}`}>
            <div className="flex items-center gap-3"><div className={`w-6 h-6 rounded-lg border-2 grid place-items-center shrink-0 ${on?'bg-volt border-volt text-ink':'border-white/25'}`}>{on&&<span className="text-sm font-black leading-none">✓</span>}</div>
            <div className="flex-1 min-w-0"><h3 className="font-bold leading-tight truncate">{p.title}</h3><p className="text-xs text-cream/45">{p.category} · {p.questionCount}問</p></div></div>
          </Card>);})}</div>
        {selectedPackIds.length>0&&<p className="text-xs text-volt mt-2.5 font-semibold">合計 {totalAvailable}問から出題されます</p>}
      </section>
      <section><SectionLabel n="02" title="ルールを決める"/>
        <div className="space-y-4 mt-3">
          <Stepper label="問題数" value={settings.totalQuestions} min={1} max={Math.max(1,totalAvailable)} step={1} suffix="問" onChange={v=>setSettings({...settings,totalQuestions:v})}/>
          <Stepper label="正解時の得点" value={settings.correctPoint} min={1} max={100} step={5} suffix="点" onChange={v=>setSettings({...settings,correctPoint:v})}/>
          <Stepper label="誤答時の得点" value={settings.wrongPoint} min={-50} max={0} step={5} suffix="点" onChange={v=>setSettings({...settings,wrongPoint:v})}/>
          <div><span className="text-sm font-semibold text-cream/70">出題者モード</span>
          <div className="flex gap-2 mt-2">{[{v:'rotation',label:'順番に交代',sub:'全員が出題者に'},{v:'fixed',label:'固定',sub:'1人が出題'}].map(m=>(
            <button key={m.v} onClick={()=>setSettings({...settings,questionerMode:m.v})} className={`flex-1 rounded-xl p-3 text-left transition border-2 ${settings.questionerMode===m.v?'bg-buzz/15 border-buzz':'bg-coal border-white/10'}`}>
              <div className="font-bold text-sm">{m.label}</div><div className="text-[11px] text-cream/45">{m.sub}</div></button>
          ))}</div></div>
        </div>
      </section>
    </div>
    <div className="absolute bottom-0 inset-x-0 p-5 bg-gradient-to-t from-ink via-ink to-transparent"><Button variant="volt" full disabled={selectedPackIds.length===0} onClick={()=>nav('/rooms/MOCK/lobby')}>ルームを作成する</Button></div>
  </PhoneShell>);
}

// ============ ROOM LOBBY ============
function RoomLobbyPage(){
  const nav=useNavigate();const {roomCode,settings,packs,selectedPackIds}=useApp();
  const [copied,setCopied]=useState(false);const members=mockMembers;
  const selectedPacks=packs.filter(p=>selectedPackIds.includes(p.id));
  const copy=()=>{navigator.clipboard?.writeText(roomCode).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),1600)};
  const Stat=({label,value})=><div><dt className="text-cream/45 text-xs">{label}</dt><dd className="font-bold">{value}</dd></div>;
  return(<PhoneShell>
    <TopBar title="ロビー" onBack={()=>nav('/')}/>
    <div className="flex-1 overflow-y-auto no-scrollbar px-5 pb-28">
      <div className="rounded-3xl bg-buzz p-6 shadow-pop text-center mb-6 relative overflow-hidden">
        <div className="absolute -right-6 -top-6 w-24 h-24 rounded-full bg-white/15"/>
        <p className="text-white/80 text-sm font-semibold relative">この番号で参加できます</p>
        <div className="font-display text-5xl tracking-[0.15em] text-white mt-2 mb-4 relative">{roomCode}</div>
        <button onClick={copy} className="relative bg-white text-buzz font-bold rounded-full px-5 py-2 text-sm active:scale-95 transition">{copied?'✓ コピーしました':'コードをコピー'}</button>
      </div>
      <div className="flex items-baseline justify-between mb-3"><h2 className="font-display text-xl">参加者</h2><span className="text-sm text-cream/50">{members.filter(m=>m.isOnline).length}人</span></div>
      <div className="space-y-2.5">{members.map(m=>(
        <div key={m.id} className="flex items-center gap-3 bg-coal rounded-2xl p-3 border border-white/10">
          <Avatar name={m.name} color={m.avatarColor}/>
          <div className="flex-1 min-w-0"><div className="font-bold leading-tight">{m.name}</div><div className="text-xs text-cream/45">{m.joinOrder===0?'ホスト':m.isGuest?'ゲスト':'メンバー'}</div></div>
          <span className={`w-2.5 h-2.5 rounded-full ${m.isOnline?'bg-volt':'bg-white/20'}`}/>
        </div>
      ))}</div>
      <div className="mt-6 rounded-2xl bg-coal/60 border border-white/10 p-4">
        <h3 className="text-sm font-semibold text-cream/70 mb-3">この大会のルール</h3>
        <dl className="grid grid-cols-2 gap-y-2.5 text-sm">
          <Stat label="問題数" value={`${settings.totalQuestions}問`}/><Stat label="正解" value={`+${settings.correctPoint}点`}/>
          <Stat label="誤答" value={`${settings.wrongPoint}点`}/><Stat label="出題者" value={settings.questionerMode==='rotation'?'順番交代':'固定'}/>
        </dl>
        <div className="mt-3 pt-3 border-t border-white/10 flex flex-wrap gap-1.5">{selectedPacks.map(p=><span key={p.id} className="text-[11px] font-bold px-2 py-0.5 rounded-full bg-volt/20 text-volt">{p.title}</span>)}</div>
      </div>
    </div>
    <div className="absolute bottom-0 inset-x-0 p-5 bg-gradient-to-t from-ink via-ink to-transparent space-y-2">
      <Button variant="volt" full onClick={()=>nav('/rooms/MOCK/game')}>クイズをはじめる</Button>
      <p className="text-center text-[11px] text-cream/40">ホストだけが開始できます</p>
    </div>
  </PhoneShell>);
}

// ============ GAME ============
const QUESTIONS=mockQuestions['pack-1'];
function GamePage(){
  const nav=useNavigate();const {settings}=useApp();
  const [role,setRole]=useState('answerer');const [qIndex,setQIndex]=useState(0);
  const [phase,setPhase]=useState('reading');const [buzzedBy,setBuzzedBy]=useState(null);
  const [scores,setScores]=useState(Object.fromEntries(mockMembers.map(m=>[m.id,0])));const [reveal,setReveal]=useState(false);
  const total=settings.totalQuestions;const q=QUESTIONS[qIndex%QUESTIONS.length];
  const sorted=[...mockMembers].sort((a,b)=>(scores[b.id]??0)-(scores[a.id]??0));const me=mockMembers[0];
  const handleBuzz=()=>{if(phase!=='reading')return;setBuzzedBy(me.id);setPhase('buzzed')};
  const judge=(c)=>{if(buzzedBy)setScores(s=>({...s,[buzzedBy]:(s[buzzedBy]??0)+(c?settings.correctPoint:settings.wrongPoint)}));setPhase('judged');setReveal(true)};
  const next=()=>{if(qIndex+1>=total){nav('/rooms/MOCK/result');return}setQIndex(i=>i+1);setPhase('reading');setBuzzedBy(null);setReveal(false)};
  const buzzedMember=mockMembers.find(m=>m.id===buzzedBy);
  const RoleTab=({active,children,onClick})=><button onClick={onClick} className={`text-xs font-bold px-3 py-1 rounded-full transition ${active?'bg-volt text-ink':'text-cream/50'}`}>{children}</button>;
  return(<PhoneShell>
    <div className="px-5 pt-6 pb-3 shrink-0">
      <div className="flex items-center justify-between mb-3">
        <span className="font-mono text-sm text-cream/50">Q{qIndex+1}<span className="text-cream/25"> / {total}</span></span>
        <div className="flex items-center gap-1 bg-coal rounded-full p-1 border border-white/10">
          <RoleTab active={role==='answerer'} onClick={()=>setRole('answerer')}>回答者</RoleTab>
          <RoleTab active={role==='questioner'} onClick={()=>setRole('questioner')}>出題者</RoleTab>
        </div>
      </div>
      <div className="h-1.5 rounded-full bg-coal overflow-hidden"><div className="h-full bg-volt transition-all duration-300" style={{width:`${((qIndex+1)/total)*100}%`}}/></div>
    </div>
    <div className="px-5 pb-3 shrink-0"><div className="flex gap-2 overflow-x-auto no-scrollbar">{sorted.map(m=>(
      <div key={m.id} className="flex items-center gap-1.5 bg-coal rounded-full pl-1 pr-3 py-1 border border-white/10 shrink-0"><Avatar name={m.name} color={m.avatarColor} size={22}/><span className="text-xs font-bold tabular-nums">{scores[m.id]??0}</span></div>
    ))}</div></div>
    <div className="flex-1 flex flex-col px-5 min-h-0">
      <div className="flex-1 grid place-items-center py-4"><div className="w-full">
        <div className="rounded-3xl bg-coal border border-white/10 p-6 min-h-[180px] flex items-center justify-center text-center"><div>
          {role==='questioner'&&<span className="text-[11px] font-bold px-2 py-0.5 rounded-full bg-buzz/20 text-buzz-400 mb-3 inline-block">あなたが出題者</span>}
          <p className="text-lg font-semibold leading-relaxed">{q.questionText}</p>
          {reveal&&<div className="mt-4 pt-4 border-t border-white/10 animate-slideUp"><p className="text-sm text-cream/50">正解</p><p className="font-display text-2xl text-volt">{q.answerText}</p>{q.explanation&&<p className="text-xs text-cream/45 mt-2">{q.explanation}</p>}</div>}
        </div></div>
        {buzzedMember&&phase!=='reading'&&<div className="mt-4 flex items-center justify-center gap-2 animate-buzzin"><Avatar name={buzzedMember.name} color={buzzedMember.avatarColor} size={28}/><span className="font-bold">{buzzedMember.name} が最速で押しました！</span></div>}
      </div></div>
      <div className="pb-7 pt-2">{role==='answerer'?<AnswererControls phase={phase} onBuzz={handleBuzz} onNext={next}/>:<QuestionerControls phase={phase} onJudge={judge} onNext={next}/>}</div>
    </div>
  </PhoneShell>);
}
function AnswererControls({phase,onBuzz,onNext}){
  if(phase==='judged')return <button onClick={onNext} className="w-full rounded-2xl bg-coal border border-white/10 font-bold py-4 active:scale-[0.99] transition">次の問題を待つ…</button>;
  return(<div className="grid place-items-center">
    <button onClick={onBuzz} disabled={phase==='buzzed'} className={`w-44 h-44 rounded-full font-display text-3xl text-white grid place-items-center transition ${phase==='buzzed'?'bg-coal text-cream/30 border-2 border-white/10':'bg-buzz shadow-pop active:translate-x-1 active:translate-y-1 active:shadow-none animate-pulseRing'}`}>{phase==='buzzed'?'押した！':'BUZZ'}</button>
    <p className="text-xs text-cream/40 mt-4">{phase==='buzzed'?'出題者の判定を待っています':'分かったら押そう'}</p>
  </div>);
}
function QuestionerControls({phase,onJudge,onNext}){
  if(phase==='reading')return <div className="text-center rounded-2xl bg-coal border border-white/10 py-5"><p className="text-cream/60 font-semibold">回答者の早押しを待っています</p><p className="text-xs text-cream/35 mt-1">誰かが押すと判定ボタンが出ます</p></div>;
  if(phase==='judged')return <button onClick={onNext} className="w-full rounded-2xl bg-volt text-ink font-bold py-4 shadow-pop active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition">次の問題へ →</button>;
  return(<div className="grid grid-cols-2 gap-3">
    <button onClick={()=>onJudge(false)} className="rounded-2xl bg-coal border-2 border-buzz/40 text-buzz-400 font-bold py-5 text-lg active:scale-95 transition">✕ 不正解</button>
    <button onClick={()=>onJudge(true)} className="rounded-2xl bg-volt text-ink font-bold py-5 text-lg shadow-pop active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition">○ 正解</button>
  </div>);
}

// ============ RESULT ============
function ResultPage(){
  const nav=useNavigate();const {isGoogleUser}=useApp();
  const ranked=[...mockResults].sort((a,b)=>b.score-a.score);const [first,second,third,...rest]=ranked;
  const Podium=({member,place,h,champion})=>{const medal=['','🥇','🥈','🥉'][place];return(
    <div className="flex flex-col items-center w-[30%]">
      {champion&&<div className="text-2xl mb-1 animate-wiggle">👑</div>}
      <Avatar name={member.name} color={member.avatarColor} size={champion?54:42}/>
      <div className="font-bold text-sm mt-1.5 truncate max-w-full">{member.name}</div>
      <div className="font-display text-xl text-volt tabular-nums leading-none">{member.score}</div>
      <div className="w-full rounded-t-xl mt-2 grid place-items-start justify-center pt-2" style={{height:h,background:champion?'linear-gradient(180deg,#FF3D7F,#e91e63)':'rgba(255,255,255,0.06)'}}><span className="text-lg">{medal}</span></div>
    </div>);};
  const Stat=({icon,v,label})=><span className="flex items-center gap-1"><span className="text-cream/30">{icon}</span><span className="font-bold text-cream/80 tabular-nums">{v}</span><span className="text-cream/30">{label}</span></span>;
  return(<PhoneShell>
    <div className="absolute -top-12 inset-x-0 h-64 bg-buzz/20 blur-3xl"/>
    <div className="flex-1 overflow-y-auto no-scrollbar px-5 pt-10 pb-28 relative z-10">
      <div className="text-center mb-8 animate-slideUp"><p className="font-mono text-xs tracking-[0.2em] text-volt uppercase">final result</p><h1 className="font-display text-4xl mt-1">大会終了！</h1></div>
      <div className="flex items-end justify-center gap-2 mb-8"><Podium member={second} place={2} h={88}/><Podium member={first} place={1} h={120} champion/><Podium member={third} place={3} h={64}/></div>
      {rest.length>0&&<div className="space-y-2 mb-6">{rest.map((m,i)=>(
        <div key={m.id} className="flex items-center gap-3 bg-coal rounded-2xl p-3 border border-white/10"><span className="font-display text-lg text-cream/40 w-6 text-center">{i+4}</span><Avatar name={m.name} color={m.avatarColor} size={32}/><span className="flex-1 font-bold truncate">{m.name}</span><span className="font-display text-lg tabular-nums">{m.score}</span></div>
      ))}</div>}
      <div className="rounded-2xl bg-coal/60 border border-white/10 p-4"><h3 className="text-sm font-semibold text-cream/70 mb-3">みんなの記録</h3>
        <div className="space-y-3">{ranked.map(m=>(
          <div key={m.id} className="flex items-center gap-3"><Avatar name={m.name} color={m.avatarColor} size={28}/><span className="text-sm font-bold w-16 truncate">{m.name}</span>
          <div className="flex-1 flex gap-3 text-xs text-cream/55"><Stat icon="○" v={m.correctCount} label="正解"/><Stat icon="⚡" v={m.buzzCount} label="早押し"/><Stat icon="?" v={m.questionerCount} label="出題"/></div></div>
        ))}</div>
      </div>
      {!isGoogleUser&&<p className="text-center text-xs text-cream/40 mt-4">Googleログインすると、この記録が履歴に残せます</p>}
    </div>
    <div className="absolute bottom-0 inset-x-0 p-5 bg-gradient-to-t from-ink via-ink to-transparent space-y-2.5">
      <Button variant="volt" full onClick={()=>nav('/rooms/new')}>もう一度あそぶ</Button>
      <Button variant="ghost" full onClick={()=>nav('/')}>トップに戻る</Button>
    </div>
  </PhoneShell>);
}

// ============ FLOW NAV ============
const SCREENS=[
  {path:'/',label:'Top'},{path:'/packs',label:'パック一覧'},{path:'/packs/new',label:'パック作成'},
  {path:'/packs/pack-1/questions',label:'問題一覧'},{path:'/rooms/new',label:'ルーム作成'},
  {path:'/rooms/MOCK/lobby',label:'ロビー'},{path:'/rooms/MOCK/game',label:'ゲーム'},{path:'/rooms/MOCK/result',label:'結果'},
];
function FlowNav(){
  const nav=useNavigate();const loc=useLocation();const [open,setOpen]=useState(false);
  return(<div className="fixed bottom-4 right-4 z-50 flex flex-col items-end gap-2" style={{right:'max(1rem, calc(50vw - 220px + 1rem))'}}>
    {open&&<div className="bg-[#1b1726] border border-white/10 rounded-2xl p-2 shadow-xl w-44 animate-slideUp">
      <p className="text-[10px] uppercase tracking-wider text-white/40 px-2 py-1 font-mono">画面ジャンプ</p>
      {SCREENS.map(s=>{const active=loc.pathname===s.path;return(
        <button key={s.path} onClick={()=>{nav(s.path);setOpen(false)}} className={`w-full text-left text-sm px-2.5 py-1.5 rounded-lg transition ${active?'bg-volt text-ink font-bold':'text-white/70 hover:bg-white/5'}`}>{s.label}</button>
      )})}
    </div>}
    <button onClick={()=>setOpen(o=>!o)} className="w-12 h-12 rounded-full bg-volt text-ink font-black grid place-items-center shadow-pop active:scale-90 transition" aria-label="画面ジャンプ">{open?'✕':'☰'}</button>
  </div>);
}

function App(){
  return(<>
    <Routes>
      <Route path="/" element={<TopPage/>}/>
      <Route path="/packs" element={<PackListPage/>}/>
      <Route path="/packs/new" element={<PackEditPage/>}/>
      <Route path="/packs/:packId/edit" element={<PackEditPage/>}/>
      <Route path="/packs/:packId/questions" element={<QuestionListPage/>}/>
      <Route path="/rooms/new" element={<RoomCreatePage/>}/>
      <Route path="/rooms/:roomId/lobby" element={<RoomLobbyPage/>}/>
      <Route path="/rooms/:roomId/game" element={<GamePage/>}/>
      <Route path="/rooms/:roomId/result" element={<ResultPage/>}/>
    </Routes>
    <FlowNav/>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <HashRouter><AppProvider><App/></AppProvider></HashRouter>
);
</script>
</body>
</html>
